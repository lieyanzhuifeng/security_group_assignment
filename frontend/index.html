<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>船舶建造智能问答系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;
  background:linear-gradient(135deg,#0c1929 0%,#0d2137 40%,#0f2b4a 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  padding:12px;
}

#vue-app{
  width:100%;max-width:480px;height:92vh;max-height:900px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);
}

/* ── header ── */
.app-header{
  padding:18px 20px 10px;text-align:center;
  background:linear-gradient(180deg,rgba(255,255,255,0.04),transparent);
}
.app-header h1{
  font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);
  letter-spacing:1px;
}
.app-header .subtitle{
  font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;
}

/* ── mode selector ── */
.mode-bar{
  display:flex;gap:6px;padding:4px 16px 12px;justify-content:center;
}
.mode-btn{
  flex:1;max-width:130px;padding:7px 0;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);
  font-size:11px;cursor:pointer;transition:all .25s;text-align:center;
  user-select:none;-webkit-user-select:none;
}
.mode-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}
.mode-btn.active{
  background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.4);
  color:#93c5fd;box-shadow:0 0 12px rgba(59,130,246,0.15);
}

/* ── chat area ── */
.chat-container{flex:1;overflow-y:auto;padding:8px 14px 16px;}
.chat-container::-webkit-scrollbar{width:3px}
.chat-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

.msg-list{display:flex;flex-direction:column;gap:8px;}

.msg{
  max-width:85%;padding:8px 14px;border-radius:14px;font-size:13.5px;
  line-height:1.65;word-break:break-word;
  animation:msgIn .3s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.system{
  align-self:center;background:rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.35);font-size:11px;max-width:95%;
  border-radius:8px;text-align:center;padding:6px 16px;
}

.msg.user{
  align-self:flex-end;background:rgba(59,130,246,0.3);
  color:#e8f0fe;border-bottom-right-radius:4px;
  border:1px solid rgba(59,130,246,0.2);
}

.msg.asr-final{
  align-self:flex-end;background:rgba(59,130,246,0.15);
  color:#93c5fd;border-bottom-right-radius:4px;
}
.msg.asr-label{font-size:10px;opacity:.5;margin-bottom:2px}

.msg.bot{
  align-self:flex-start;background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.85);border-bottom-left-radius:4px;
  border:1px solid rgba(255,255,255,0.06);
}

.msg.llm-token{
  align-self:flex-start;background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.78);border-bottom-left-radius:4px;
  border:1px solid rgba(255,255,255,0.05);
  transition:none;animation:none;
}
.msg.llm-token .bot-label{font-size:10px;color:rgba(255,255,255,0.28);margin-bottom:2px}

.msg.asr-partial{
  align-self:flex-end;background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.35);font-style:italic;font-size:12px;
  border-bottom-right-radius:4px;
}

.msg.security{
  align-self:flex-start;background:rgba(251,146,60,0.2);
  color:#fdba74;border:1px solid rgba(251,146,60,0.2);
  border-bottom-left-radius:4px;
}

/* ── bottom bar ── */
.bottom-bar{
  padding:10px 20px 18px;display:flex;flex-direction:column;
  align-items:center;gap:8px;
  border-top:1px solid rgba(255,255,255,0.06);
  background:linear-gradient(0deg,rgba(255,255,255,0.03),transparent);
}

.record-btn{
  width:64px;height:64px;border-radius:50%;border:2px solid rgba(59,130,246,0.4);
  background:rgba(59,130,246,0.15);color:#93c5fd;
  font-size:22px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;
  position:relative;
}
.record-btn:hover{background:rgba(59,130,246,0.25);transform:scale(1.04)}
.record-btn:active{transform:scale(.94)}

.record-btn.recording{
  background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);
  color:#fca5a5;animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}
  50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}
}

.record-btn.disabled{
  background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.15);cursor:not-allowed;
}

.status-line{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(255,255,255,0.4)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.idle{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.4)}
.status-dot.recording{background:#ef4444;animation:dotBlink .6s infinite}
.status-dot.processing{background:#f59e0b;animation:dotBlink .8s infinite}
.status-dot.disconnected{background:#6b7280}
@keyframes dotBlink{50%{opacity:.25}}

.hint-text{font-size:11px;color:rgba(255,255,255,0.2);text-align:center}
</style>
</head>
<body>

<div id="vue-app">
  <div class="app-header">
    <h1>⚓ 船舶建造智能问答</h1>
    <div class="subtitle">基于流式管线 · 语音交互</div>
  </div>

  <div class="mode-bar">
    <div v-for="m in modes" :key="m.key"
         class="mode-btn" :class="{active:wsMode===m.key}"
         @click="switchMode(m.key)">
      {{ m.label }}
    </div>
  </div>

  <div class="chat-container" ref="chatRef">
    <div class="msg-list">
      <div v-for="(msg,i) in messages" :key="i"
           :class="['msg', msg.cls]">
        <template v-if="msg.label">{{ msg.label }}</template>
        {{ msg.text }}
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="record-btn"
         :class="{recording:isRecording, disabled:status==='processing'}"
         @mousedown="startRec" @mouseup="stopRec"
         @mouseleave="stopRecIfRecording"
         @touchstart.prevent="startRec" @touchend.prevent="stopRec">
      {{ isRecording ? '⏹' : '🎤' }}
    </div>
    <div class="status-line">
      <span class="status-dot" :class="statusClass"></span>
      {{ statusText }}
    </div>
    <div class="hint-text">按住说话 · 松手发送</div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, reactive, nextTick, watch, onMounted } = Vue;

createApp({
  setup(){
    const chatRef = ref(null);
    const messages = reactive([]);
    const status = ref('idle');
    const wsMode = ref('w1');
    const isRecording = ref(false);

    const modes = [
      {key:'w1',label:'W1 基线'},
      {key:'w2',label:'W2 全流式'},
      {key:'w3',label:'W3 安全'},
    ];

    const statusText = ref('就绪');
    const statusClass = ref('idle');

    let ws = null, audioCtx = null, source = null, processor = null, stream = null;
    let audioQueue = [], audioPlaying = false;
    let tmpMsgIdx = -1;

    function setStatus(t,c){
      statusText.value = t;
      statusClass.value = c;
    }

    function addMsg(text,cls,label){
      messages.push({text,cls,label:label||''});
      scrollDown();
    }

    function scrollDown(){
      nextTick(()=>{
        if(chatRef.value) chatRef.value.scrollTop = chatRef.value.scrollHeight;
      });
    }

    function connect(m){
      if(ws){ ws.close(); ws=null; }
      wsMode.value = m;
      ws = new WebSocket(`ws://${location.host}/ws?mode=${m}`);
      ws.onopen = () => setStatus('就绪','idle');
      ws.onclose = () => setStatus('连接断开','disconnected');
      ws.onmessage = onMsg;
      ws.onerror = () => setStatus('连接错误','disconnected');
    }

    function onMsg(e){
      const d = JSON.parse(e.data);
      if(d.error){
        addMsg('错误: '+d.error,'bot','');
        setStatus('就绪','idle');
        return;
      }
      if(d.type === 'asr_partial'){
        if(tmpMsgIdx < 0){
          messages.push({text:'🎤 '+d.text,cls:'asr-partial',label:''});
          tmpMsgIdx = messages.length-1;
        }else{
          messages[tmpMsgIdx].text = '🎤 '+d.text;
        }
        scrollDown();
      }else if(d.type === 'asr_final'){
        if(tmpMsgIdx >= 0){ messages.splice(tmpMsgIdx,1); tmpMsgIdx=-1; }
        addMsg(d.text,'asr-final','转录:');
      }else if(d.type === 'llm_token'){
        const last = messages.length>0 ? messages[messages.length-1] : null;
        if(!last || last.cls !== 'llm-token'){
          messages.push({text:'🤖 ',cls:'llm-token',label:'AI'});
        }
        const cur = messages[messages.length-1];
        cur.text += d.text;
        scrollDown();
      }else if(d.type === 'answer'){
        if(tmpMsgIdx >= 0){ messages.splice(tmpMsgIdx,1); tmpMsgIdx=-1; }
        const cls = d.safe===false ? 'security' : 'bot';
        addMsg(d.text,cls,'AI:');
      }else if(d.type === 'tts_chunk'){
        playAudio(d.data);
      }else if(d.type === 'audio'){
        playAudio(d.data);
        setStatus('就绪','idle');
      }else if(d.type === 'done'){
        setStatus('就绪','idle');
      }
    }

    function playAudio(b64){
      audioQueue.push(b64);
      if(!audioPlaying) _playNext();
    }
    function _playNext(){
      if(!audioQueue.length){ audioPlaying=false; return; }
      audioPlaying = true;
      const bin = Uint8Array.from(atob(audioQueue.shift()),c=>c.charCodeAt(0));
      const blob = new Blob([bin],{type:'audio/wav'});
      const url = URL.createObjectURL(blob);
      const a = new Audio(url);
      a.onended = ()=>{ URL.revokeObjectURL(url); _playNext(); };
      a.play().catch(()=>_playNext());
    }

    async function startRec(){
      if(status.value === 'processing') return;
      try{
        stream = await navigator.mediaDevices.getUserMedia({
          audio:{sampleRate:16000,channelCount:1}
        });
        audioCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
        source = audioCtx.createMediaStreamSource(stream);
        const bufLen = 2048;
        processor = audioCtx.createScriptProcessor(bufLen,1,1);
        isRecording.value = true;
        processor.onaudioprocess = e => {
          if(!isRecording.value) return;
          const input = e.inputBuffer.getChannelData(0);
          const pcm = new Int16Array(input.length);
          for(let i=0;i<input.length;i++){
            const s = Math.max(-1,Math.min(1,input[i]));
            pcm[i] = s<0 ? s*32768 : s*32767;
          }
          if(ws && ws.readyState===WebSocket.OPEN) ws.send(pcm.buffer);
        };
        source.connect(processor);
        processor.connect(audioCtx.destination);
        setStatus('录音中…','recording');
      }catch(e){
        addMsg('麦克风不可用: '+e.message,'bot','');
      }
    }

    function stopRec(){
      isRecording.value = false;
      if(processor){ processor.disconnect(); processor=null; }
      if(source){ source.disconnect(); source=null; }
      if(audioCtx){ audioCtx.close(); audioCtx=null; }
      if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
      audioQueue = []; audioPlaying = false;
      if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'audio_end'}));
      setStatus('处理中…','processing');
    }

    function stopRecIfRecording(){
      if(isRecording.value) stopRec();
    }

    function switchMode(m){
      wsMode.value = m;
      connect(m);
      // 清除之前的切换提示
      for(let i=messages.length-1;i>=0;i--){
        if(messages[i].cls==='system') messages.splice(i,1);
      }
      addMsg('已切换到 '+modes.find(x=>x.key===m).label,'system','');
      if(tmpMsgIdx >= 0){ messages.splice(tmpMsgIdx,1); tmpMsgIdx=-1; }
      const idx = messages.length - 1;
      setTimeout(()=>{ if(messages[idx]?.cls==='system') messages.splice(idx,1); }, 2500);
    }

    onMounted(()=>{
      connect('w1');
    });

    return {
      chatRef, messages, status, wsMode, isRecording,
      modes, statusText, statusClass,
      startRec, stopRec, stopRecIfRecording, switchMode,
    };
  }
}).mount('#vue-app');
</script>
</body>
</html>
