<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>船舶建造智能问答系统 · 流式管线</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#f0f2f5;height:100vh;display:flex;justify-content:center;align-items:center}
#app{width:560px;height:92vh;max-height:860px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
header{padding:14px 20px 6px;text-align:center}
header h1{font-size:16px;color:#1a1a1a;font-weight:600}
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 16px 0;font-size:12px}
#toolbar select{flex:1;padding:4px 8px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fafafa;cursor:pointer}
#toolbar .tag{font-size:10px;padding:2px 8px;border-radius:10px;background:#e3f2fd;color:#1565c0;white-space:nowrap}
#chat{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:88%;padding:8px 12px;border-radius:10px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.user{align-self:flex-end;background:#1565c0;color:#fff;border-bottom-right-radius:3px}
.msg.bot{align-self:flex-start;background:#f5f5f5;color:#212121;border-bottom-left-radius:3px}
.msg.asr-partial{background:#e3f2fd;color:#1565c0;font-style:italic;font-size:13px;align-self:flex-end;border-bottom-right-radius:3px}
.msg.asr-final{background:#bbdefb;color:#0d47a1;font-size:13px;align-self:flex-end;border-bottom-right-radius:3px}
.msg.llm-token{background:#f5f5f5;color:#555;font-size:13px;align-self:flex-start}
.msg.llm-token .meta{font-size:10px;color:#aaa;margin-top:2px}
.msg.security{align-self:flex-start;background:#fff3e0;color:#e65100;border-bottom-left-radius:3px}
#bottom{padding:8px 20px 14px;border-top:1px solid #eee;display:flex;flex-direction:column;align-items:center;gap:4px}
#recordBtn{width:58px;height:58px;border-radius:50%;border:none;background:#1565c0;color:#fff;font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
#recordBtn:active{transform:scale(.92)}
#recordBtn.recording{background:#d32f2f;box-shadow:0 0 0 4px rgba(211,47,47,.2)}
#recordBtn:disabled{background:#bbb;cursor:not-allowed}
#status{font-size:12px;color:#999;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.idle{background:#aaa}
.dot.recording{background:#d32f2f;animation:blink .8s infinite}
.dot.processing{background:#f9a825;animation:blink .8s infinite}
@keyframes blink{50%{opacity:.3}}
</style>
</head>
<body>
<div id="app">
  <header><h1>船舶建造智能问答系统 · 流式管线</h1></header>
  <div id="toolbar">
    <select id="workflowSelect">
      <option value="w1">W1 基线 · 非流式</option>
      <option value="w2">W2 流式ASR</option>
      <option value="w3">W3 全流式</option>
      <option value="w4">W4 全量优化</option>
    </select>
    <span class="tag" id="modeTag">非流式</span>
  </div>
  <div id="chat">
    <div class="msg bot"><div style="font-size:11px;color:#999">🤖 系统</div>按住 🎤 说话，松手发送</div>
  </div>
  <div id="bottom">
    <button id="recordBtn">🎤</button>
    <div id="status"><span class="dot idle"></span>就绪</div>
  </div>
</div>
<script>
const chat=document.getElementById("chat"),recordBtn=document.getElementById("recordBtn"),
      statusEl=document.getElementById("status"),wsSel=document.getElementById("workflowSelect"),
      modeTag=document.getElementById("modeTag");
let ws=null,audioCtx=null,source=null,processor=null,stream=null;
let isRecording=false,wsMode="w1";
const descs={w1:"非流式",w2:"流式ASR",w3:"全流式",w4:"全量优化"};

function connect(m){
  if(ws)ws.close();
  wsMode=m;
  ws=new WebSocket(`ws://${location.host}/ws?mode=${m}`);
  ws.onopen=()=>setStatus("就绪","idle");
  ws.onclose=()=>setStatus("连接断开","idle");
  ws.onmessage=onMsg;
  ws.onerror=()=>setStatus("连接错误","idle");
}

function onMsg(e){
  const d=JSON.parse(e.data);
  if(d.error){addMsg("错误: "+d.error,"bot");setStatus("就绪","idle");return}
  if(d.type==="asr_partial")showTmp("🎤 "+d.text,"asr-partial")
  else if(d.type==="asr_final"){clearTmp();addMsg("🎤 "+d.text,"asr-final")}
  else if(d.type==="llm_token"){
    let el=chat.querySelector(".llm-token:last-child");
    if(!el||el.dataset.sealed){el=document.createElement("div");el.className="msg llm-token";el.dataset.sealed="";chat.appendChild(el)}
    el.textContent+="🤖 "+d.text;chat.scrollTop=chat.scrollHeight
  }else if(d.type==="answer"){clearTmp();addMsg("🤖 "+d.text,d.safe===false?"security":"bot")}
  else if(d.type==="tts_chunk"){clearTmp();addMsg("🤖 "+d.text,"bot");playAudio(d.data)}
  else if(d.type==="audio"){playAudio(d.data);setStatus("就绪","idle")}
  else if(d.type==="done"){setStatus("就绪","idle")}
}

function playAudio(b64){
  const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const blob=new Blob([bin],{type:"audio/mpeg"}),url=URL.createObjectURL(blob);
  const a=new Audio(url);
  a.onended=()=>URL.revokeObjectURL(url);
  a.play().catch(()=>{});
}

function setStatus(t,s){statusEl.innerHTML=`<span class="dot ${s}"></span>${t}`}
let tmpEl=null;
function showTmp(t,cls){
  if(!tmpEl){tmpEl=document.createElement("div");tmpEl.className="msg "+cls;chat.appendChild(tmpEl)}
  tmpEl.textContent=t;chat.scrollTop=chat.scrollHeight
}
function clearTmp(){if(tmpEl){tmpEl.remove();tmpEl=null}}
function addMsg(t,cls){
  const d=document.createElement("div");d.className="msg "+cls;d.textContent=t;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight
}

async function startRec(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1}});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    source=audioCtx.createMediaStreamSource(stream);
    const bufLen=2048;
    processor=audioCtx.createScriptProcessor(bufLen,1,1);
    isRecording=true;
    processor.onaudioprocess=e=>{
      if(!isRecording)return;
      const input=e.inputBuffer.getChannelData(0);
      const pcm=new Int16Array(input.length);
      for(let i=0;i<input.length;i++){
        const s=Math.max(-1,Math.min(1,input[i]));
        pcm[i]=s<0?s*32768:s*32767;
      }
      if(ws&&ws.readyState===WebSocket.OPEN)ws.send(pcm.buffer);
    };
    source.connect(processor);
    processor.connect(audioCtx.destination);
    recordBtn.classList.add("recording");recordBtn.textContent="⬤";
    setStatus("录音中…","recording");
  }catch(e){addMsg("麦克风不可用: "+e.message,"bot")}
}

function stopRec(){
  isRecording=false;
  if(processor){processor.disconnect();processor=null}
  if(source){source.disconnect();source=null}
  if(audioCtx){audioCtx.close();audioCtx=null}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  recordBtn.classList.remove("recording");recordBtn.textContent="🎤";
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:"audio_end"}));
  setStatus("处理中…","processing");
}

recordBtn.addEventListener("mousedown",startRec);
recordBtn.addEventListener("mouseup",stopRec);
recordBtn.addEventListener("mouseleave",()=>{if(isRecording)stopRec()});
recordBtn.addEventListener("touchstart",e=>{e.preventDefault();startRec()});
recordBtn.addEventListener("touchend",e=>{e.preventDefault();stopRec()});

wsSel.addEventListener("change",()=>{
  const m=wsSel.value;modeTag.textContent=descs[m];connect(m);addMsg("切换到 "+descs[m],"bot")
});

connect("w1");
</script>
</body>
</html>
